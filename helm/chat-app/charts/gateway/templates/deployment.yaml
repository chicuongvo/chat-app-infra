apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "gateway.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    app: gateway
    chart: {{ .Chart.Name }}-{{ .Chart.Version }}
    release: {{ .Release.Name }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app: gateway
      release: {{ .Release.Name }}
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: gateway
        release: {{ .Release.Name }}
    spec:
      containers:
        - name: gateway
          image: "{{ .Values.global.imageRegistry }}/{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.global.imagePullPolicy | default "IfNotPresent" }}
          ports:
            - containerPort: 4000
          env:
            - name: NODE_ENV
              value: production
            - name: GATEWAY_PORT
              value: "4000"
            - name: AUTH_SERVICE_URL
              value: http://auth-service:4003
            - name: USER_SERVICE_URL
              value: http://user-service:4001
            - name: CHAT_SERVICE_URL
              value: http://chat-service:4002
            - name: MULTIMEDIA_SERVICE_URL
              value: http://multimedia-service:4004
            - name: NOTIFICATION_SERVICE_URL
              value: http://notification-service:4010
            - name: REALTIME_SERVICE_URL
              value: http://realtime-service:3001
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: chatapp-secrets
                  key: JWT_SECRET
            - name: INTERNAL_API_TOKEN
              valueFrom:
                secretKeyRef:
                  name: chatapp-secrets
                  key: INTERNAL_API_TOKEN
          readinessProbe:
            httpGet:
              path: /health
              port: 4000
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 4000
            initialDelaySeconds: 20
            periodSeconds: 30
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
