apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "multimedia-service.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    app: multimedia-service
    release: {{ .Release.Name }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app: multimedia-service
      release: {{ .Release.Name }}
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: multimedia-service
        release: {{ .Release.Name }}
    spec:
      containers:
        - name: multimedia-service
          image: "{{ .Values.global.imageRegistry }}/{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.global.imagePullPolicy | default "IfNotPresent" }}
          ports:
            - containerPort: 4004
          env:
            - name: NODE_ENV
              value: production
            - name: PORT
              value: "4004"
            - name: INTERNAL_API_TOKEN
              valueFrom:
                secretKeyRef:
                  name: chatapp-secrets
                  key: INTERNAL_API_TOKEN
            - name: MINIO_ENDPOINT
              value: minio
            - name: MINIO_PORT
              value: "9000"
            - name: MINIO_USE_SSL
              value: "false"
            - name: MINIO_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: chatapp-secrets
                  key: MINIO_ACCESS_KEY
            - name: MINIO_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: chatapp-secrets
                  key: MINIO_SECRET_KEY
            - name: MINIO_BUCKET
              value: chatapp-media
          readinessProbe:
            httpGet:
              path: /health
              port: 4004
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 4004
            initialDelaySeconds: 20
            periodSeconds: 30
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
