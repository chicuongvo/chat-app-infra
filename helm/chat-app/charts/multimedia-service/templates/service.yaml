apiVersion: v1
kind: Service
metadata:
  name: multimedia-service
  namespace: {{ .Release.Namespace }}
  labels:
    app: multimedia-service
    release: {{ .Release.Name }}
spec:
  type: {{ .Values.service.type }}
  selector:
    app: multimedia-service
    release: {{ .Release.Name }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.service.targetPort }}
      protocol: TCP
