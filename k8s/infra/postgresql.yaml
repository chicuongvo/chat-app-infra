---
# PostgreSQL for Auth Service
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgresql-auth
  namespace: chatapp
spec:
  replicas: 1
  selector:
    matchLabels:
      app: postgresql-auth
  template:
    metadata:
      labels:
        app: postgresql-auth
    spec:
      containers:
        - name: postgresql
          image: postgres:16-alpine
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_DB
              value: chatapp_auth
            - name: POSTGRES_USER
              value: chatapp_auth
            - name: POSTGRES_PASSWORD
              value: chatapp_password
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "chatapp_auth", "-d", "chatapp_auth"]
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            exec:
              command: ["pg_isready", "-U", "chatapp_auth"]
            initialDelaySeconds: 20
            periodSeconds: 30
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 300m
              memory: 256Mi
          volumeMounts:
            - name: auth-db-data
              mountPath: /var/lib/postgresql/data
      volumes:
        - name: auth-db-data
          persistentVolumeClaim:
            claimName: postgresql-auth-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: postgresql-auth
  namespace: chatapp
spec:
  selector:
    app: postgresql-auth
  ports:
    - port: 5432
      targetPort: 5432
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: postgresql-auth-pvc
  namespace: chatapp
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 2Gi
---
