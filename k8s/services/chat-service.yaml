apiVersion: apps/v1
kind: Deployment
metadata:
  name: chat-service
  namespace: chatapp
  labels:
    app: chat-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: chat-service
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: chat-service
    spec:
      containers:
        - name: chat-service
          image: ghcr.io/YOUR_ORG/chatapp-chat-service:latest
          ports:
            - containerPort: 4002
          env:
            - name: NODE_ENV
              value: production
            - name: CHAT_SERVICE_PORT
              value: "4002"
            - name: MONGO_URL
              valueFrom:
                secretKeyRef:
                  name: chatapp-secrets
                  key: MONGO_URL
            - name: REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: chatapp-secrets
                  key: REDIS_URL
            - name: RABBITMQ_URL
              valueFrom:
                secretKeyRef:
                  name: chatapp-secrets
                  key: RABBITMQ_URL
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: chatapp-secrets
                  key: JWT_SECRET
            - name: INTERNAL_API_TOKEN
              valueFrom:
                secretKeyRef:
                  name: chatapp-secrets
                  key: INTERNAL_API_TOKEN
            - name: USER_SERVICE_GRPC_URL
              value: user-service:50051
          readinessProbe:
            httpGet:
              path: /health
              port: 4002
            initialDelaySeconds: 15
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 4002
            initialDelaySeconds: 30
            periodSeconds: 30
          resources:
            requests:
              cpu: 150m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
---
apiVersion: v1
kind: Service
metadata:
  name: chat-service
  namespace: chatapp
spec:
  selector:
    app: chat-service
  ports:
    - port: 4002
      targetPort: 4002
---
# HPA for chat-service — auto-scale under load
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: chat-service-hpa
  namespace: chatapp
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: chat-service
  minReplicas: 2
  maxReplicas: 8
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
